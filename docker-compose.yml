name: smartlinks

services:
  redirectservice:
    build:
      context: .
      dockerfile: RedirectService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RulesService__BaseUrl: http://rulesservice:8080
    ports:
      - "8080:8080"
    depends_on:
      - rulesservice

  rulesservice:
    build:
      context: .
      dockerfile: RulesService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "18081:8080"
    volumes:
      - ./RulesService/Rules:/app/Rules
